name: hermes release watch (sentinel)

# Stage ① 哨兵 / Sentinel — daily, script-only, NO LLM/tokens.
# Checks whether NousResearch/hermes-agent has a release newer than .hermes-pin.
# On a new release: runs the skill's mechanical checks and opens/updates a "drift" issue.
# It never changes docs or the pin. Inert while the pin equals the latest release.

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: hermes-release-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run release-watch sentinel
        id: sentinel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          out="$(bash .github/scripts/hermes-release-watch.sh)"; rc=$?
          echo "$out"
          [ "$rc" -ne 0 ] && { echo "sentinel failed (rc=$rc)"; exit "$rc"; }
          echo "status=$(printf '%s\n' "$out" | head -1)" >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: startsWith(steps.sentinel.outputs.status, 'DRIFT')
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.sentinel.outputs.status }}
        run: |
          set -euo pipefail
          tag="$(printf '%s' "$STATUS" | awk '{print $2}')"
          title="hermes drift: $tag"
          gh label create hermes-drift --color FBCA04 \
            --description "Upstream hermes release ahead of the docs pin" 2>/dev/null || true
          num="$(gh issue list --state open --search "$title in:title" --json number,title \
                 --jq ".[] | select(.title==\"$title\") | .number" | head -1)"
          if [ -n "$num" ]; then
            gh issue comment "$num" --body-file hermes-drift-report.md
            echo "updated existing issue #$num"
          else
            gh issue create --title "$title" --label hermes-drift --body-file hermes-drift-report.md
            echo "created new issue"
          fi
